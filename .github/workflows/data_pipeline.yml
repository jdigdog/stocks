name: Build data + Deploy GitHub Pages

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 1-5" # 10:30 UTC weekdays

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------- Data pipeline (Python) --------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build prices + benchmarking artifacts
        run: |
          python -m compileall backend/scripts
          python -m backend.scripts.fetch_prices
          python -m backend.scripts.build_public_data

      - name: Build sentiment artifacts (best-effort)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: |
          python -m backend.scripts.fetch_sentiment_with_citations || true

      - name: Ensure sentiment pointer exists (never 404 in build)
        run: |
          python - << 'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          base = Path("frontend/public/data/sentiment")
          base.mkdir(parents=True, exist_ok=True)

          day_files = sorted([p for p in base.glob("*.json") if p.name != "latest.json"], reverse=True)
          if not day_files:
            today = datetime.now(timezone.utc).date().isoformat()
            day_path = base / f"{today}.json"
            day_path.write_text(json.dumps({
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "date": today,
              "items": []
            }, separators=(",", ":")), encoding="utf-8")
            day_files = [day_path]

          latest = day_files[0]
          (base / "latest.json").write_text(json.dumps({
            "latest": f"data/sentiment/{latest.name}"
          }, separators=(",", ":")), encoding="utf-8")

          print("Sentiment latest pointer ->", f"data/sentiment/{latest.name}")
          print("Sentiment files:", [p.name for p in sorted(base.glob('*.json'))])
          PY

      - name: Verify public data present for UI build
        run: |
          test -f frontend/public/data/index.json
          test -f frontend/public/data/sentiment/latest.json
          ls -la frontend/public/data
          ls -la frontend/public/data/sentiment

      # -------- UI build + Pages deploy (Node) --------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install UI deps
        working-directory: frontend
        run: |
          npm ci || npm install

      - name: Build UI
        working-directory: frontend
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
