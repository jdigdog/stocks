name: Data pipeline (prices, benchmarking, sentiment)

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 1-5"  # 10:30 UTC weekdays

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pipeline
        env:
          # Optional secrets (sentiment sources)
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: |
          python -m compileall backend/scripts
          python -m backend.scripts.fetch_prices
          python -m backend.scripts.build_public_data
          python -m backend.scripts.fetch_sentiment_with_citations || true

      - name: Commit generated public data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add frontend/public/data
          git commit -m "Update public data" || echo "No changes"
          git push
