name: Data pipeline (prices, benchmarking, sentiment)

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 1-5" # 10:30 UTC weekdays

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pipeline (prices + benchmarking)
        run: |
          python -m compileall backend/scripts
          python -m backend.scripts.fetch_prices
          python -m backend.scripts.build_public_data

      - name: Run sentiment (best-effort)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: |
          python -m backend.scripts.fetch_sentiment_with_citations || true

      - name: Ensure sentiment pointer exists (never 404)
        run: |
          python - << 'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          base = Path("frontend/public/data/sentiment")
          base.mkdir(parents=True, exist_ok=True)

          # If a day-file exists, point to newest. Otherwise, create an empty day-file and point to it.
          day_files = sorted([p for p in base.glob("*.json") if p.name != "latest.json"], reverse=True)
          if not day_files:
              today = datetime.now(timezone.utc).date().isoformat()
              day_path = base / f"{today}.json"
              day_path.write_text(json.dumps({
                  "generated_at": datetime.now(timezone.utc).isoformat(),
                  "date": today,
                  "items": []
              }, separators=(",", ":")), encoding="utf-8")
              day_files = [day_path]

          latest = day_files[0]
          (base / "latest.json").write_text(json.dumps({
              "latest": f"data/sentiment/{latest.name}"
          }, separators=(",", ":")), encoding="utf-8")

          print("Sentiment latest pointer ->", f"data/sentiment/{latest.name}")
          print("Files in sentiment dir:", [p.name for p in sorted(base.glob("*.json"))])
          PY

      - name: Verify public data exists
        run: |
          test -f frontend/public/data/index.json
          test -f frontend/public/data/sentiment/latest.json
          ls -la frontend/public/data || true
          ls -la frontend/public/data/sentiment || true

      - name: Commit generated public data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add frontend/public/data
          git status --porcelain
          git commit -m "Update public data" || echo "No changes"
          git push
